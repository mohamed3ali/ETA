upstream api_upstream {
    server api:4000;
}

upstream web_upstream {
    server web:3000;
}

# Trim verbose default Nginx logging for noisy bots.
map $http_user_agent $loggable {
    default 1;
    "~*bot|crawl|spider"  0;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 50m;

    # Let's Encrypt HTTP-01 challenge (when using certbot --webroot).
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # When TLS is enabled (see the HTTPS block below), redirect everything else.
    # Comment this block out if you intentionally want to serve HTTP only.
    # return 301 https://$host$request_uri;

    location /api/ {
        proxy_pass http://api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
    }

    location / {
        proxy_pass http://web_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
    }
}

